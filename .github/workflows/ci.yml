name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [backend, candidates, recruiter, admin]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run lint
        if: matrix.app != 'backend'
      - run: npx prisma generate
        if: matrix.app == 'backend'
      - run: npm run build
        env:
          VITE_API_BASE: https://example-backend.onrender.com
